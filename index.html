<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LostbyRequiem</title>

<style>
  body {
    margin: 0;
    color: white;
    font-family: Arial, sans-serif;

    /* BACKGROUND IMAGE */
    background: 
      linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
      url("https://i.imgur.com/INsvylp.jpeg") center/cover no-repeat;

    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .container {
    text-align: center;
    max-width: 340px;
    backdrop-filter: blur(6px);
  }

  img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 20px;
  }

  h1 {
    font-size: 16px;
    letter-spacing: 3px;
    margin-bottom: 10px;
  }

  p {
    font-size: 13px;
    color: #bbb;
    margin: 4px 0;
  }

  a {
    display: block;
    margin-top: 12px;
    text-decoration: none;
    color: white;
    border: 1px solid #555;
    padding: 10px;
    border-radius: 6px;
    transition: 0.2s;
    font-size: 14px;
  }

  a:hover {
    background: #111;
    color: #9c88ff;
    border-color: #9c88ff;
  }
</style>
</head>
