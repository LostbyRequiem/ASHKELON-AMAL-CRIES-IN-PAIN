<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artist Statement | LostbyRequiem</title>

<style>

body {
    margin: 0;
    color: white;
    font-family: Arial, sans-serif;

    background:
      linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
      url("https://i.imgur.com/fXMoeeQ.jpeg") center/cover fixed;

    min-height: 100vh;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 60px 20px 120px;
}

.paper {
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(6px);

    border-radius: 10px;

    padding: 40px;
}

h1 {
    text-align: center;
    letter-spacing: 4px;
    margin-bottom: 40px;
}

p {
    line-height: 1.8;
    color: #cccccc;
}

a {
    display: inline-block;
    margin-top: 30px;

    color: white;
    text-decoration: none;

    border: 1px solid #555;
    padding: 10px 20px;
    border-radius: 6px;

    transition: .2s;
}

a:hover {
    background: #111;
    color: #9c88ff;
    border-color: #9c88ff;
}

footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;

    text-align: center;
    padding: 15px;

    background: rgba(0,0,0,.6);
    backdrop-filter: blur(4px);

    color: #888;
    font-size: 12px;
}

</style>
</head>
